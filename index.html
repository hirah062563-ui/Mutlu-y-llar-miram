<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ben Senden Vazgeçmem</title>
    <style>
        :root { --bordo: #4a0414; --altin: #d4af37; }
        body { background-color: var(--bordo); color: #f4e7d3; font-family: 'Georgia', serif; margin: 0; padding: 20px; }
        h2 { color: var(--altin); text-align: center; }
        
        /* GÜN SAYACI */
        .counter-box { border: 2px solid var(--altin); padding: 20px; text-align: center; margin: 20px auto; max-width: 300px; }
        
        /* FOTO GALERİ */
        .foto-slider { display: flex; overflow-x: auto; gap: 10px; padding: 20px 0; }
        .foto-slider img { height: 300px; border: 2px solid var(--altin); }

        /* YAPBOZ */
        .puzzle-board { display: grid; grid-template-columns: repeat(3, 100px); gap: 2px; margin: 20px auto; width: 300px; }
        .puzzle-piece { width: 100px; height: 100px; background-size: 300px 300px; cursor: pointer; border: 1px solid #000; }

        /* VİDEO */
        .video-container { text-align: center; margin: 20px 0; }
        video { width: 100%; max-width: 400px; border: 2px solid var(--altin); }

        /* PLAK VE SÖZLER */
        .vinyl { width: 150px; height: 150px; background: black; border-radius: 50%; margin: 20px auto; animation: spin 4s linear infinite; border: 10px solid #333; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .lyrics { text-align: center; font-style: italic; margin-top: 10px; line-height: 1.6; }

        /* ŞARAP VE ŞİİR */
        details { border: 1px solid var(--altin); padding: 10px; margin: 20px auto; max-width: 400px; cursor: pointer; }
        
        /* DAİRE KOLYE */
        .locket { width: 150px; height: 150px; border-radius: 50%; margin: 20px auto; position: relative; overflow: hidden; cursor: pointer; border: 3px solid var(--altin); }
        .locket img { width: 150px; height: 150px; object-fit: cover; }
    </style>
</head>
<body>

    <h2 id="baslik">Bizim Hikayemiz</h2>
    <div class="counter-box">
        <span id="days">0</span> gündür beraberiz...
    </div>

    <div class="foto-slider">
        <img src="IMG_20260701_211244.jpg">
        <img src="IMG_20260701_205730.jpg">
        <img src="IMG_20260701_205424.jpg">
    </div>

    <h2 style="font-size: 18px;">Bizi Birleştir</h2>
    <div class="puzzle-board" id="puzzle"></div>

    <div class="video-container">
        <video controls src="VID_20260701_205618.mp4"></video>
    </div>

    <div class="vinyl"></div>
    <div class="lyrics">
        Ben senden vazgeçmem<br>Işıkları söndürseler bile<br>Korkuma yenilmem<br>Ben sensiz pes etmem
    </div>

    <details>
        <summary style="font-size: 30px; text-align: center;">🍷</summary>
        <p style="white-space: pre-line;">
            Maruzatım odur ki; en iyi bir dostsun
            Dağların doruğunda bir çiçek kadar iyi
            Sen karanlıkta yüzümüzü ağartan ışık...
        </p>
    </details>

    <div class="locket" onclick="this.innerHTML='<img src=\'IMG_20260701_205240.jpg\'>'">
        <div style="text-align: center; padding-top: 50px;">TIKLA</div>
    </div>

    <script>
        // GÜN SAYACI
        const date = Math.floor((new Date() - new Date('2022-09-17')) / (1000 * 60 * 60 * 24));
        document.getElementById('days').innerText = date;

        // YAPBOZ
        const puzzle = document.getElementById('puzzle');
        for(let i=0; i<9; i++) {
            let div = document.createElement('div');
            div.className = 'puzzle-piece';
            div.style.backgroundImage = 'url(IMG_20260701_211244.jpg)';
            div.style.backgroundPosition = `-${(i%3)*100}px -${Math.floor(i/3)*100}px`;
            puzzle.appendChild(div);
        }
    </script>
</body>
</html>
